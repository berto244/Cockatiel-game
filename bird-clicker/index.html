<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cockatiel Empire - Full Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  font-family: 'Press Start 2P', cursive;
  background: linear-gradient(#001122, #000);
  color: #ff0;
  text-align: center;
  margin: 0;
  padding: 10px;
}

#bird {
  width: 250px;
  height: 250px;
  cursor: pointer;
  border: 6px solid #0f0;
  border-radius: 50%;
  box-shadow: 0 0 30px #0f0;
  transition: 0.1s;
}

.upgrade {
  margin: 8px auto;
  padding: 12px;
  background: #112;
  border: 3px solid #ff0;
  width: 85%;
  max-width: 500px;
  cursor: pointer;
}

#stats {
  font-size: 1em;
  margin: 15px;
  background: #000;
  padding: 10px;
  border: 2px solid #ff0;
}

#message {
  height: 40px;
  color: #0f0;
  font-size: 1em;
}
</style>
</head>

<body>
<h1>🐦 COCKATIEL EMPIRE</h1>

<div id="stats">
  Seeds: <span id="seeds">0</span> |
  Level: <span id="level">1</span>
</div>

<img id="bird" src="https://picsum.photos/id/1024/250/250" alt="Bird">

<div id="message"></div>

<h2>UPGRADES</h2>
<div class="upgrade" id="u1">🐦 Better Perch (50) +2 Power</div>
<div class="upgrade" id="u2">🎾 Toy Swarm (250) +8/sec</div>
<div class="upgrade" id="u3">⚡ Lightning Nest (1200) x3</div>
<div class="upgrade" id="u4">👑 Royal Crown (5000) Prestige</div>
<div class="upgrade" id="premium">💎 GO PREMIUM $4.99</div>

<script>
let seeds = 0;
let power = 1;
let auto = 0;
let mult = 1;
let lvl = 1;

const bird = document.getElementById('bird');
const seedsEl = document.getElementById('seeds');
const lvlEl = document.getElementById('level');
const msg = document.getElementById('message');

bird.addEventListener('click', () => {
  seeds += power * mult;
  bird.style.transform = 'scale(0.85) rotate(-15deg)';
  setTimeout(() => {
    bird.style.transform = 'scale(1) rotate(0deg)';
  }, 100);
  update();
});

function update() {
  seedsEl.textContent = Math.floor(seeds);
  lvlEl.textContent = lvl;
}

function showMessage(text) {
  msg.textContent = text;
  setTimeout(() => {
    msg.textContent = '';
  }, 2000);
}

document.getElementById('u1').onclick = () => {
  if (seeds >= 50) {
    seeds -= 50;
    power += 2;
    showMessage("Better Perch bought!");
    update();
  } else {
    showMessage("Not enough seeds!");
  }
};

document.getElementById('u2').onclick = () => {
  if (seeds >= 250) {
    seeds -= 250;
    auto += 8;
    showMessage("Toy Swarm bought!");
    update();
  } else {
    showMessage("Not enough seeds!");
  }
};

document.getElementById('u3').onclick = () => {
  if (seeds >= 1200) {
    seeds -= 1200;
    mult *= 3;
    showMessage("Lightning Nest bought!");
    update();
  } else {
    showMessage("Not enough seeds!");
  }
};

document.getElementById('u4').onclick = () => {
  if (seeds >= 5000) {
    seeds -= 5000;
    lvl += 1;
    mult += 0.5;
    showMessage("Prestige upgraded!");
    update();
  } else {
    showMessage("Not enough seeds!");
  }
};

document.getElementById('premium').onclick = () => {
  mult *= 1.5;
  showMessage("PREMIUM UNLOCKED!");
  update();
};

setInterval(() => {
  seeds += auto * mult / 10;
  update();
}, 100);

update();
</script>

</body>
</html>
